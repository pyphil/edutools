
<!DOCTYPE html>
<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.2/font/bootstrap-icons.css">
  <meta http-equiv="refresh" content="240">

  <style>
    body {
      /* background-color: #ebebeb; */
      /* background-color: #d3ecff; */
      background: rgb(142,198,238);
      background: linear-gradient(90deg, rgba(142,198,238,1) 10%, rgba(94,173,214,1) 50%, rgba(162,221,222,1) 92%);
    }
    .display-6 {
      font-family: 'Segoe Print', Noteworthy, sans-serif;
      font-size: 2vw;
    }
    .carousel-control-next,
    .carousel-control-prev /*, .carousel-indicators */ {
      filter: invert(80%);
    }
  </style>
</head>

{% load static %}
<body>
  {% if request.user.is_staff %}
  <a href="{% url 'dsb_admin' %}" title="DSB Einstellungen"
     style="position: fixed; top: 1rem; right: 1rem; z-index: 2000; width: 3rem; height: 3rem; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.92); border-radius: 50%; box-shadow: 0 0 0.9rem rgba(0,0,0,0.18); color: #212529; text-decoration: none;">
    <i class="bi bi-gear-fill" style="font-size: 1.4rem;"></i>
  </a>
  {% endif %}
  <div class="container-lg">
    <div class="row mt-4">

      <div class="col px-5">
        <div class="card shadow">
          <div class="card-header">
            <h1 class="display-6 mb-0 text-center"><strong>Info {{ dsb2_name }}</strong></h1>
          </div>
          <div id="info" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
            {% for file in files_infodsb2 %}
              <div class="carousel-item {% if forloop.first %}active{% endif %}" data-bs-interval="240000">
                <img src="{% url 'dsb_media' key 'infodsb2' file %}" class="d-block w-100" alt="{{ file }}">
              </div>
            {% endfor %}
            </div>
          </div>

          <button class="carousel-control-prev" type="button" data-bs-target="#info" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
          </button>
          <button class="carousel-control-next" type="button" data-bs-target="#info" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
          </button>
        </div>
      </div>
    </div>

    <div class="row mt-4">
      <div class="col text-center">
        <a href="{% url 'dsb2' key %}" class="btn btn-primary btn-lg shadow">zurück</a>
      </div>
    </div>

    </div>
  </div>

</body>
</html>
