
<!DOCTYPE html>
<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.2/font/bootstrap-icons.css">
  <!-- Refresh der Seite alle 120 Sekunden. Um den Browser dazu zu zwingen nicht auf gecachte Inhalte
    zurückzugreifen, muss zufälliger URL Parameter (?random=123...) übergeben werden. In diesem Fall der
    Unix timestamp, der aus der Django view-Funktion übergeben wird. Der aktuelle Pfad wird durch "request.path"
    eingesetzt.
  -->
  <meta http-equiv="refresh" content="120;url={{ request.path }}?random={{ timestamp }}">

  <style>
    body {
      /* background-color: #ebebeb; */
      background: rgb(142,198,238);
      background: linear-gradient(90deg, rgba(142,198,238,1) 10%, rgba(94,173,214,1) 50%, rgba(162,221,222,1) 92%);
    }
    .h1 {
      font-family: 'Segoe Print', Noteworthy, sans-serif;
      font-size: 2vw;
    }
    .h5 {
      font-family: 'Segoe Print', Noteworthy, sans-serif;
      font-weight: bolder;
      font-size: 1.3vw;
    }
    /* Vor weißem Hintergrund sind die Vor- und Zurück-Pfeile nur zu sehen, wenn
    die Farbe invertiert wird. 80 % = leichtes Grau */
    .carousel-control-next,
    .carousel-control-prev {
      filter: invert(80%);
    }
    /* Make whole page zoomable with on touch displays */
    .carousel.pointer-event {
      touch-action: pan-y pinch-zoom;
    }
  </style>
  <script>
    // Eine Uhr in Javascript
    function updateClock() {
      var now = new Date();
      var hours = now.getHours();
      var minutes = now.getMinutes();
      var seconds = now.getSeconds();
      // Führende hinzufügen, wenn weniger als zwei Stellen
      if (seconds < 10) {
        seconds = "0" + seconds;
      }
      if (minutes < 10) {
        minutes = "0" + minutes;
      }
      if (hours < 10) {
        hours = "0" + hours;
      }
      // Uhrzeit als String zusammensetzen
      document.getElementById("clock").innerHTML = hours + ":" + minutes + ":" + seconds;
    }
    // im Sekundentakt laufen lassen
    setInterval(updateClock, 1000);
  </script>
</head>

<body>
  <div class="container-fluid">
    <div class="row mt-4">

      <div class="col">
        <div class="card shadow">
          <div class="card-header">
            <h1 class="h1 mb-0 text-center"><strong>Heute (DSB2)</strong></h1>
          </div>
          <div id="heute" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
            {% for file in files_vheutedsb2 %}
              <div class="carousel-item {% if forloop.first %}active{% endif %}" data-bs-interval="15000">
                <img src="{% url 'dsb_media' key 'VheuteDSB2' file %}" class="d-block w-100" alt="{{ file }}">
              </div>
            {% endfor %}
            </div>
          </div>

          <button class="carousel-control-prev" type="button" data-bs-target="#heute" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
          </button>
          <button class="carousel-control-next" type="button" data-bs-target="#heute" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
          </button>
        </div>
      </div>

      <div class="col">
        <div class="card shadow">
          <div class="card-header">
            <h1 class="h1 mb-0 text-center"><strong>Nächster Schultag (DSB2)</strong></h1>
          </div>
          <div id="morgen" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
            {% for file in files_vmorgendsb2 %}
              <div class="carousel-item {% if forloop.first %}active{% endif %}" data-bs-interval="15000">
                <img src="{% url 'dsb_media' key 'VmorgenDSB2' file %}" class="d-block w-100" alt="{{ file }}">
              </div>
            {% endfor %}
            </div>
          </div>

          <button class="carousel-control-prev" type="button" data-bs-target="#morgen" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
          </button>
          <button class="carousel-control-next" type="button" data-bs-target="#morgen" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
          </button>
        </div>
      </div>
      <div class="col-3">
        <div class="row">
          <div class="col text-center">
            <h1 class="h1 badge rounded-pill bg-light text-dark mb-5" id="clock" style="font-family: monospace;">&nbsp;</h1>
            {% if files_infodsb2 %}
            <div class="card shadow">
              <div class="card-header">
                <h5 class="h5 mb-0 text-center">Info MZ</h5>
              </div>
              <div id="info2" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-inner">
                  {% for file in files_infodsb2 %}
                    <div class="carousel-item {% if forloop.first %}active{% endif %}" data-bs-interval="10000">
                      <a href="{% url 'dsb2_info' key %}"><img src="{% url 'dsb_media' key 'infodsb2' file %}" class="d-block w-100" alt="{{ file }}"></a>
                    </div>
                  {% endfor %}
                </div>
              </div>

              <button class="carousel-control-prev" type="button" data-bs-target="#info2" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
              </button>
              <button class="carousel-control-next" type="button" data-bs-target="#info2" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
              </button>
            </div>
            {% endif %}
          </div>
        </div>
        <div class="row mt-5">
          <div class="col text-center">
            <a href="{% url 'dsb1' key %}" class="btn btn-primary shadow h5"><i class="bi bi-arrow-right-circle-fill"></i> Plan Niederzier</a>
            <a href="{% url 'dsb_terminplan' key %}" class="btn btn-primary shadow h5"><i class="bi bi-calendar"></i> Kalender</a>
          </div>
          <!-- <div class="alert alert-warning text-center mt-5 shadow" role="alert">
            Der Pendlerplan kann nun angezeigt werden.
          </div> -->
        </div>
      </div>

    </div>
  </div>

</body>
</html>
