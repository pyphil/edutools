services:
  django:
    build: .
    container_name: edutools_django
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 3 --timeout 60 edutools_site.wsgi:application"
    env_file:
      - .env
    volumes:
      - data:/app/data
      - media:/app/media
      - static:/app/public/static
    environment:
      # Override .env settings specifically for Docker
      SQLITE_PATH: /app/data/db.sqlite3
      STATIC_ROOT: /app/public/static
      MEDIA_ROOT: /app/media
    expose:
      - 8000
    networks:
      - edutools_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: edutools_nginx
    ports:
      - "127.0.0.1:8001:80"
      # - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - media:/app/media:ro
      - static:/app/public/static:ro
      # Uncomment the lines below if you have SSL certificates
      # - ./certs:/etc/nginx/certs:ro
    depends_on:
      - django
    networks:
      - edutools_network
    restart: unless-stopped

networks:
  edutools_network:
    driver: bridge

volumes:
  data:
  media:
  static:
