services:
  web:
    build: .
    container_name: edutools_web
    restart: unless-stopped

    environment:
      DJANGO_SETTINGS_MODULE: edutools_site.settings
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      #CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}

      SQLITE_PATH: /data/db.sqlite3
      MEDIA_ROOT: /data/media
      STATIC_ROOT: /app/public/static

      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}

    volumes:
      - ./data:/data
      - static_volume:/app/public/static

    expose:
      - "8000"

    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput --clear &&
        gunicorn edutools_site.wsgi:application --bind 0.0.0.0:8000
      "

  nginx:
    image: nginx:stable-alpine
    container_name: edutools_nginx
    restart: unless-stopped

    depends_on:
      - web

    ports:
      - "8000:8000"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/static:ro

volumes:
  static_volume: